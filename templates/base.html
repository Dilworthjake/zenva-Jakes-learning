<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}JakeIMGResizer{% endblock %}</title>
  <style>
    :root {
      --bg-deep: #07060d;
      --bg-panel: rgba(12, 10, 22, 0.85);
      --text: #e4e2ff;
      --text-dim: #8b87a8;
      --cyan: #00f0ff;
      --cyan-dim: rgba(0, 240, 255, 0.15);
      --magenta: #ff2ea6;
      --magenta-dim: rgba(255, 46, 166, 0.12);
      --violet: #9d4edd;
      --border: rgba(0, 240, 255, 0.35);
      --glow-cyan: 0 0 20px rgba(0, 240, 255, 0.35), 0 0 40px rgba(0, 240, 255, 0.12);
      --glow-magenta: 0 0 18px rgba(255, 46, 166, 0.35);
      --radius: 4px;
      --font-display: system-ui, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      --font-mono: ui-monospace, "Cascadia Code", "Cascadia Mono", "Consolas", monospace;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html { height: 100%; }

    body {
      margin: 0;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--text);
      background-color: var(--bg-deep);
      background-image:
        linear-gradient(180deg, rgba(10, 8, 20, 0.3) 0%, transparent 40%),
        linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px),
        linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(157, 78, 221, 0.25), transparent 55%),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(255, 46, 166, 0.08), transparent 50%);
      background-size: 100% 100%, 24px 24px, 24px 24px, 100% 100%, 100% 100%;
      background-attachment: fixed;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.12) 2px,
        rgba(0, 0, 0, 0.12) 4px
      );
      z-index: 9999;
      opacity: 0.35;
    }

    .page-frame {
      position: relative;
      z-index: 1;
      flex: 1 0 auto;
      display: flex;
      flex-direction: column;
      max-width: 52rem;
      width: 100%;
      margin: 0 auto;
      padding: 1.25rem 1.25rem 0;
    }

    .site-header {
      flex-shrink: 0;
      margin-bottom: 1rem;
      padding: 0.85rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-panel);
      box-shadow: var(--glow-cyan), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(8px);
    }

    .site-header-inner {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem 1.25rem;
    }

    .brand {
      font-family: var(--font-display);
      font-size: clamp(0.95rem, 2.5vw, 1.15rem);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--text);
      text-shadow: 0 0 20px rgba(0, 240, 255, 0.45), 0 0 40px rgba(255, 46, 166, 0.2);
    }

    .brand:hover { color: #fff; }
    .brand span.accent { color: var(--cyan); }

    .site-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem 0.5rem;
      align-items: center;
    }

    .site-nav a {
      font-family: var(--font-display);
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--text-dim);
      padding: 0.4rem 0.65rem;
      border: 1px solid transparent;
      border-radius: 2px;
      transition: color 0.15s, border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }

    .site-nav a:hover {
      color: var(--cyan);
      border-color: rgba(0, 240, 255, 0.35);
      background: var(--cyan-dim);
    }

    .site-nav a.active {
      color: var(--cyan);
      border-color: rgba(0, 240, 255, 0.55);
      box-shadow: 0 0 14px rgba(0, 240, 255, 0.2);
    }

    .wrap {
      flex: 1 0 auto;
      padding-bottom: 1.5rem;
    }

    .shell {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--glow-cyan), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      padding: 1.5rem 1.5rem 1.75rem;
      backdrop-filter: blur(8px);
    }

    .page-lead {
      margin: 0 0 1.25rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(0, 240, 255, 0.2);
    }

    .page-lead h1.page-title {
      font-family: var(--font-display);
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin: 0 0 0.45rem;
      color: var(--text);
    }

    .tagline {
      margin: 0;
      font-size: 0.78rem;
      color: var(--text-dim);
      letter-spacing: 0.04em;
    }

    .tagline code {
      color: var(--cyan);
      background: var(--cyan-dim);
      padding: 0.1em 0.35em;
      border-radius: 2px;
      font-size: 0.85em;
    }

    .badge {
      display: inline-block;
      margin-top: 0.5rem;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--magenta);
      border: 1px solid rgba(255, 46, 166, 0.45);
      padding: 0.15rem 0.45rem;
      border-radius: 2px;
      box-shadow: var(--glow-magenta);
    }

    fieldset {
      border: 1px solid rgba(0, 240, 255, 0.28);
      border-radius: var(--radius);
      margin: 0 0 1.25rem;
      padding: 1rem 1.1rem 1.15rem;
      background: linear-gradient(135deg, var(--cyan-dim), transparent 40%, var(--magenta-dim));
    }

    legend {
      font-family: var(--font-display);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0 0.5rem;
      color: var(--cyan);
    }

    label {
      display: block;
      margin: 0.55rem 0 0.35rem;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    input[type="number"],
    input[type="file"],
    select {
      width: 100%;
      max-width: 22rem;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text);
      background: rgba(5, 4, 12, 0.9);
      border: 1px solid rgba(0, 240, 255, 0.25);
      border-radius: var(--radius);
      padding: 0.5rem 0.65rem;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="number"]:focus,
    input[type="file"]:focus,
    select:focus {
      outline: none;
      border-color: var(--cyan);
      box-shadow: 0 0 0 1px var(--cyan), 0 0 16px rgba(0, 240, 255, 0.2);
    }

    input[type="file"]::file-selector-button {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-right: 0.75rem;
      padding: 0.35rem 0.65rem;
      border: 1px solid var(--magenta);
      border-radius: 2px;
      background: rgba(255, 46, 166, 0.12);
      color: var(--magenta);
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }

    input[type="file"]::file-selector-button:hover {
      background: rgba(255, 46, 166, 0.22);
      box-shadow: 0 0 12px rgba(255, 46, 166, 0.35);
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem 1.25rem;
      align-items: flex-end;
    }

    .row > div { flex: 0 0 auto; }

    button[type="submit"],
    .btn {
      margin-top: 1.1rem;
      font-family: var(--font-display);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.6rem 1.1rem;
      cursor: pointer;
      border-radius: var(--radius);
      text-decoration: none;
      display: inline-block;
      border: 1px solid var(--cyan);
      transition: transform 0.12s, box-shadow 0.15s, filter 0.15s;
    }

    button[type="submit"] {
      color: var(--bg-deep);
      background: linear-gradient(180deg, var(--cyan) 0%, #00c4d4 100%);
      box-shadow: var(--glow-cyan);
    }

    button[type="submit"]:hover {
      filter: brightness(1.08);
      box-shadow: 0 0 28px rgba(0, 240, 255, 0.55), 0 0 50px rgba(0, 240, 255, 0.2);
    }

    button[type="submit"]:active { transform: translateY(1px); }

    .btn-secondary {
      margin-top: 0;
      color: var(--cyan);
      background: transparent;
      border-color: rgba(0, 240, 255, 0.45);
      box-shadow: none;
    }

    .btn-secondary:hover {
      background: var(--cyan-dim);
      box-shadow: 0 0 16px rgba(0, 240, 255, 0.25);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem 1rem;
      align-items: center;
      margin-bottom: 1rem;
    }

    .flash {
      padding: 0.55rem 0.85rem;
      border-radius: var(--radius);
      margin-bottom: 0.75rem;
      font-size: 0.82rem;
      border-left: 3px solid;
    }

    .flash.error {
      background: rgba(255, 46, 106, 0.1);
      border-color: #ff3e6a;
      color: #ffb8cc;
    }

    .flash.ok {
      background: rgba(0, 240, 255, 0.08);
      border-color: var(--cyan);
      color: #b8fff9;
    }

    .preview-heading {
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin: 0 0 0.75rem;
      color: var(--magenta);
      text-shadow: 0 0 20px rgba(255, 46, 166, 0.45);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(10.5rem, 1fr));
      gap: 1rem;
      margin-top: 0.25rem;
    }

    .card {
      border: 1px solid rgba(157, 78, 221, 0.35);
      border-radius: var(--radius);
      padding: 0.55rem;
      background: linear-gradient(160deg, rgba(157, 78, 221, 0.08), rgba(5, 4, 12, 0.95));
      box-shadow: 0 0 0 1px rgba(0, 240, 255, 0.08), 0 8px 24px rgba(0, 0, 0, 0.45);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      border-color: rgba(0, 240, 255, 0.45);
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.15), 0 8px 28px rgba(0, 0, 0, 0.5);
    }

    .card .img-frame {
      border-radius: 2px;
      overflow: hidden;
      border: 1px solid rgba(0, 240, 255, 0.2);
      background: #040308;
    }

    .card img {
      width: 100%;
      height: auto;
      display: block;
    }

    .card p {
      margin: 0.5rem 0 0.4rem;
      font-size: 0.72rem;
      word-break: break-all;
      color: var(--text-dim);
      line-height: 1.35;
    }

    .card a {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--cyan);
      border-bottom: 1px solid rgba(0, 240, 255, 0.4);
      padding-bottom: 0.1rem;
      transition: color 0.15s, text-shadow 0.15s, border-color 0.15s;
    }

    .card a:hover {
      color: #fff;
      text-shadow: 0 0 12px var(--cyan);
      border-color: var(--cyan);
    }

    .site-footer {
      flex-shrink: 0;
      margin-top: auto;
      padding: 1rem 1.25rem 1.5rem;
      max-width: 52rem;
      width: 100%;
      margin-left: auto;
      margin-right: auto;
    }

    .site-footer-inner {
      padding: 0.75rem 1rem;
      border: 1px solid rgba(0, 240, 255, 0.2);
      border-radius: var(--radius);
      background: rgba(5, 4, 12, 0.65);
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      text-align: center;
    }

    .site-footer-inner strong {
      color: var(--cyan);
      font-weight: 600;
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <div class="page-frame">
    <header class="site-header">
      <div class="site-header-inner">
        <a class="brand" href="{{ url_for('index') }}">Jake<span class="accent">IMG</span>Resizer</a>
        <nav class="site-nav" aria-label="Main">
          <a href="{{ url_for('index') }}" class="{{ 'active' if (active_page|default('')) == 'upload' else '' }}">Upload</a>
          <a href="{{ url_for('preview') }}" class="{{ 'active' if (active_page|default('')) == 'preview' else '' }}">Preview</a>
        </nav>
      </div>
    </header>

    <div class="wrap">
      <div class="shell">
        {% block content %}{% endblock %}
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <strong>JakeIMGResizer</strong> · local image resizer · cursor assisted development · {% block footer_note %}Pillow + Flask{% endblock %}
    </div>
  </footer>
</body>
</html>
